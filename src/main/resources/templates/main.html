<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메인 페이지</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<div th:replace="~{include/top::top}"></div>

<section class="full-banner-container" id="banner-container">
    <a th:href="@{/reserve/ticket.do(performanceId=${randomProducts[0].performanceId})}" class="banner-wrapper">
        <div class="banner-item active" id="current-banner" 
             th:style="'background-image: url(https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/' + ${randomProducts[0].posterImageName} + ');'">
            <div class="banner-content">
                <h2 th:text="${randomProducts[0].title}">공연 제목</h2>
                <p th:text="${randomProducts[0].startDate} + ' ~ ' + ${randomProducts[0].endDate}">날짜</p>
            </div>
        </div>
    </a>
</section>

<section class="content-section">
    <div class="ticket-notice-container" th:if="${fastTitle != null}">
        <div class="notice-header">
            <span>⏰ 다가오는 티켓팅</span>
        </div>
        <div class="notice-body">
         <a th:href="@{/reserve/ticket.do(performanceId=${fastId})}">
                <h4 th:text="${fastTitle}">공연 제목</h4>
                <p th:if="${fastOpeningTime != null}" 
                   th:text="'티켓팅 시작: ' + ${#temporals.format(fastOpeningTime, 'yyyy.MM.dd HH:mm')}"></p>
            </a>
        </div>
    </div>
</section>

<div th:replace="~{include/bottom::footer}"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    let currentIndex = 0;
    const products = /*[[${randomProducts}]]*/ []; 

    setInterval(() => {
        if (products.length <= 1) return; // 제품이 하나 이하면 작동 안 함

        const nextIndex = (currentIndex + 1) % products.length;
        const next = products[nextIndex];
        
        // 1. 새 배너 생성 (위에서 대기 중인 상태)
        const $newBanner = $(`
            <div class="banner-item incoming" style="background-image: url('https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/${next.posterImageName}');">
                <div class="banner-content">
                    <a href="/reserve/ticket.do?id=${next.performanceId}"><h2>${next.title}</h2></a>
                    <p>${next.startDate} ~ ${next.endDate}</p>
                </div>
            </div>
        `);
        
        $('#banner-container').append($newBanner);
        
        // 2. 현재 배너와 새 배너의 클래스를 바꿔서 애니메이션 시작
        const $currentBanner = $('.banner-item.active');

        // 브라우저가 위치 변화를 인식할 아주 짧은 찰나의 시간 부여
        setTimeout(() => {
            $currentBanner.removeClass('active').addClass('outgoing'); // 기존꺼는 아래로
            $newBanner.removeClass('incoming').addClass('active');    // 새꺼는 중앙으로
        }, 50);

        // 3. 애니메이션이 끝난 후(0.8초 뒤) 쓸모없는 이전 배너 삭제
        setTimeout(() => {
            $('.banner-item.outgoing').remove();
        }, 800);
        
        currentIndex = nextIndex;
        
    }, 5000); // 5초마다 교체
    /*]]>*/
</script>
</body>
</html>
