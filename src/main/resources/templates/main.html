<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>메인 페이지</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

<div th:replace="~{include/top::top}"></div>

<section class="full-banner-container" id="banner-container">
    <div class="banner-item active" 
         th:if="${not #lists.isEmpty(randomProducts)}"
         th:onclick="|location.href='/reserve/ticket.do?performanceId=${randomProducts[0].performanceId}'|"
         th:style="'background-image: url(https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/' + ${randomProducts[0].posterImageName} + '); cursor:pointer;'">
        <div class="banner-content">
            <h2 th:text="${randomProducts[0].title}">공연 제목</h2>
            <p th:text="${randomProducts[0].startDate} + ' ~ ' + ${randomProducts[0].endDate}">날짜</p>
        </div>
    </div>

	<div class="banner-controls" th:if="${not #lists.isEmpty(randomProducts) and randomProducts.size() > 1}">
	    <button id="prev-banner" class="control-btn" title="이전 배너">&#9652;</button>
	    <button id="next-banner" class="control-btn" title="다음 배너">&#9662;</button>
	</div>
</section>

<section class="content-section">
    <div class="ticket-notice-container" th:if="${fastTitle != null}">
        <div class="notice-header">
            <span>⏰ 다가오는 티켓팅</span>
        </div>
        <div class="notice-body">
         <a th:href="@{/reserve/ticket.do(performanceId=${fastId})}">
                <h4 th:text="${fastTitle}">공연 제목</h4>
                <p th:if="${fastOpeningTime != null}" 
                   th:text="'티켓팅 시작: ' + ${#temporals.format(fastOpeningTime, 'yyyy.MM.dd HH:mm')}"></p>
            </a>
        </div>
    </div>
</section>

<div th:replace="~{include/bottom::footer}"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    let currentIndex = 0;
    const products = /*[[${randomProducts}]]*/ []; 
    let bannerInterval; // 자동 전환 타이머 변수

    // 1. 배너 전환 핵심 로직 (함수로 분리)
    function changeBanner(direction = 'next') {
        if (!products || products.length <= 1) return;

        // 다음 인덱스 계산
        let nextIndex;
        if (direction === 'next') {
            nextIndex = (currentIndex + 1) % products.length;
        } else {
            nextIndex = (currentIndex - 1 + products.length) % products.length;
        }

        const next = products[nextIndex];
        
        // 방향에 따른 클래스 설정 (이전 버튼 클릭 시 아래에서 위로 오게 하려면 'incoming-reverse' 등 활용 가능)
        // 여기서는 기존에 쓰시던 incoming/outgoing 로직을 유지합니다.
        const $newBanner = $(`
            <div class="banner-item incoming" 
                 onclick="location.href='/reserve/ticket.do?performanceId=${next.performanceId}'"
                 style="background-image: url('https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/${next.posterImageName}'); cursor:pointer;">
                <div class="banner-content">
                    <h2>${next.title}</h2>
                    <p>${next.startDate} ~ ${next.endDate}</p>
                </div>
            </div>
        `);
        
        $('#banner-container').append($newBanner);
        
        const $currentBanner = $('.banner-item.active');

        setTimeout(() => {
            $currentBanner.removeClass('active').addClass('outgoing');
            $newBanner.removeClass('incoming').addClass('active');
        }, 50);

        setTimeout(() => {
            $('.banner-item.outgoing').remove();
        }, 800);
        
        currentIndex = nextIndex;
    }

    // 2. 타이머 시작 함수
    function startAutoSlide() {
        if (products.length > 1) {
            bannerInterval = setInterval(() => {
                changeBanner('next');
            }, 5000);
        }
    }

    // 3. 사용자가 버튼 클릭 시 타이머 리셋
    function resetTimer() {
        clearInterval(bannerInterval);
        startAutoSlide();
    }

    // 4. 초기 실행 및 이벤트 바인딩
    $(document).ready(function() {
        // 자동 재생 시작
        startAutoSlide();

        // 이전 버튼 클릭 이벤트
        $(document).on('click', '#prev-banner', function() {
            changeBanner('prev');
            resetTimer();
        });

        // 다음 버튼 클릭 이벤트
        $(document).on('click', '#next-banner', function() {
            changeBanner('next');
            resetTimer();
        });
    });
    /*]]>*/
</script>
</body>
</html>
