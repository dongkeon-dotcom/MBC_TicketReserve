<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{include/top::top}"></div>
<head>
    <meta charset="UTF-8">
    <title>공연 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/admin/showEdit.css}">
</head>
<body>
    <div class="is-started-overlay" th:if="${isStarted}" 
         style="background: #fff3cd; color: #856404; text-align: center; padding: 15px; font-weight: bold; border-bottom: 1px solid #ffeeba;">
        ⚠️ 판매가 시작되어 일부 정보 수정이 불가능합니다 (조회 전용 모드)
    </div>


	<section class="admin-container">
	    <h1 class="page-title">공연 정보 및 회차 수정</h1>

	    <form th:action="@{/admin/showupdate.do}" method="post" enctype="multipart/form-data" onsubmit="return validateAndSubmit()">
	        <input type="hidden" name="performanceId" th:value="${performance.performanceId}">
	        <div id="drag-selection-rect"></div>
	        
	        <div class="section">
	            <h2>1. 공연 기본 정보</h2>
	            <div class="form-group">
	                <label>공연 제목</label>
	                <input type="text" name="title" th:value="${performance.title}" required th:attr="readonly=${isStarted}">
	            </div>
	            
	            <div class="date-row total-period">
	                <div class="period-title"><strong>📅 공연 전체 운영 기간</strong></div>
	                <div class="date-item">
	                    <label>전체 시작일</label>
	                    <input type="date" name="startDate" id="startDate" th:value="${performance.startDate}" required onchange="syncOpenDateLimits()" th:attr="readonly=${isStarted}">
	                </div>
	                <div class="date-item">
	                    <label>전체 종료일</label>
	                    <input type="date" name="endDate" id="endDate" th:value="${performance.endDate}" required onchange="syncOpenDateLimits()" th:attr="readonly=${isStarted}">
	                </div>
	            </div>
	        </div>

	        <div class="section">
	            <h2>2. 요일별 회차 및 생성 범위 설정</h2>
	            <div class="day-schedule-container" style="display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 10px; padding-bottom: 10px;">
	                <div th:each="day : ${#strings.arraySplit('월,화,수,목,금,토,일', ',')}" class="day-schedule-item" style="flex: 0 0 120px;">
	                    <div class="day-header">
	                        <span class="day-name">[[${day}]]</span>
	                        <div class="radio-group">
	                            <label><input type="radio" th:name="'is' + ${day} + 'Show'" value="Y" th:onclick="toggleTimeInputs([[${day}]], true)" th:disabled="${isStarted}"> 있음</label>
	                            <label><input type="radio" th:name="'is' + ${day} + 'Show'" value="N" checked th:onclick="toggleTimeInputs([[${day}]], false)" th:disabled="${isStarted}"> 없음</label>
	                        </div>
	                    </div>
	                    <div th:id="'time-area-' + ${day}" class="time-input-area" style="display:none;">
	                        <div th:id="'time-list-' + ${day}" class="time-list"></div>
	                        <button th:if="${!isStarted}" type="button" class="btn-add-time" th:onclick="addTimeInput([[${day}]])">+ 시간 추가</button>
	                    </div>
	                </div>
	            </div>
	            <input type="hidden" name="weeklySchedule" id="weeklyScheduleInput">

	            <div id="open-period-container">
	                <div th:each="period, stat : ${openPeriods}" class="open-period-box" th:id="'open-box-' + ${stat.count}">
	                    
	                    <div class="period-title">
	                        <strong>🎟️ 생성할 회차 범위 (세트 [[${stat.count}]])</strong>
	                        <button th:if="${!period['isStarted'] && stat.count > 1}" type="button" class="btn-remove" 
	                                onclick="this.closest('.open-period-box').remove()">삭제</button>
	                    </div>
	                    
	                    <div class="date-row">
	                        <div class="date-item">
	                            <label>오픈 시작일</label>
	                            <input type="date" name="openStartDates" class="openStart" th:value="${period['start']}" 
	                                   required th:attr="readonly=${period['isStarted']}">
	                        </div>
	                        <div class="date-item">
	                            <label>오픈 종료일</label>
	                            <input type="date" name="openEndDates" class="openEnd" th:value="${period['end']}" 
	                                   required th:attr="readonly=${period['isStarted']}">
	                        </div>
	                    </div>
	                    
	                    <div class="form-group opening-time-group">
	                        <label>🔔 티켓 예매 시작 일시 </label>
	                        <input type="datetime-local" 
	                               name="openingTimes" 
	                               th:value="${period['formattedOpeningTime']}" 
	                               required 
	                               th:attr="readonly=${period['isStarted']}">
	                    </div>
	                </div>
	            </div>
<button type="button" class="btn-add" onclick="addOpenPeriod()">+ 티켓 오픈 범위 추가</button>
	        </div>

	        <div class="section">
	            <h2>3. 이미지 정보</h2>
	            <div class="form-group">
	                <label>메인 포스터 (기존)</label>
	                <div id="poster-pre" class="preview-box">
	                    <img th:src="@{|https://s3-202601052.s3.ap-northeast-2.amazonaws.com/${performance.posterImageName}|}" width="180" style="border-radius: 8px;">
	                </div>
	                <input th:if="${!isStarted}" type="file" name="posterFile" accept="image/*" onchange="previewSingle(this, 'poster-pre')">
	            </div>
	        </div>

	        <div class="section">
	            <h2>4. 좌석 등급 설정 및 배치도 수정</h2>
	            <div id="grade-container">
	                <div th:each="config, stat : ${gradeConfigs}" class="grade-item">
	                    <span class="grade-label">[[${stat.count}]]번 등급:</span>
	                    <input type="text" name="gradeNames" th:value="${config.gradeName}" required oninput="updateSelectors()" th:attr="readonly=${isStarted}">
	                    <input type="text" name="gradePrices" th:value="${#numbers.formatInteger(config.gradePrice, 0, 'COMMA')}" required oninput="handlePriceInput(this)" th:attr="readonly=${isStarted}">
	                </div>
	            </div>
	            
	            <div class="seat-work-area">
	                <p>💡 <b>수정할 등급 버튼을 누른 후 좌석을 드래그하세요.</b></p>
	                <div id="grade-selectors" class="selector-row"></div>
	                <div id="seat-map" class="seat-grid" style="display: grid; grid-template-columns: repeat(6, 50px); gap: 10px; justify-content: center; padding: 20px; background: #333; border-radius: 12px;"></div>
	            </div>
	            <input type="hidden" name="seatGradeMap" id="seatGradeMapInput">
	        </div>

<button type="submit" class="btn-submit">수정 내용 저장하기</button>
	    </form>
	</section>

    <div th:replace="~{include/bottom::footer}"></div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const isStarted = /*[[${isStarted}]]*/ false;
        const seatGradeMapRaw = /*[[${seatGradeMap}]]*/ '{}'; 
        const seatAssignment = JSON.parse(seatGradeMapRaw); 
        const weeklyScheduleRaw = /*[[${weeklySchedule}]]*/ '{}';
        const initialSchedule = JSON.parse(weeklyScheduleRaw);

        let currentSelectedGrade = 1;
        let isDrawing = false;
        let startX, startY;
        const selectionRect = document.getElementById('drag-selection-rect');
        const seatMap = document.getElementById('seat-map');

        document.addEventListener("DOMContentLoaded", function() {
            initSeatMap();           
            restoreWeeklySchedule(); 
            updateSelectors();       
            syncOpenDateLimits();
        });

        function syncOpenDateLimits() {
            const totalStart = document.getElementById('startDate').value;
            const totalEnd = document.getElementById('endDate').value;
            if (!totalStart || !totalEnd) return;
            document.querySelectorAll('.openStart, .openEnd').forEach(el => {
                el.min = totalStart; el.max = totalEnd;
            });
        }

        function initSeatMap() {
            seatMap.innerHTML = ''; 
            const seats = [];
            for (let i = 1; i <= 30; i++) {
                const seatNo = i.toString();
                const grade = seatAssignment[seatNo] || 1;
                const seat = document.createElement('div');
                seat.className = `seat grade-color-${grade}`;
                seat.innerText = seatNo;
                seat.dataset.seatNo = seatNo;
                seatMap.appendChild(seat);
                seats.push(seat);
            }
            updateSeatInput();
            if (!isStarted) setupDragLogic(seats);
        }

        function setupDragLogic(seats) {
            seatMap.onmousedown = (e) => {
                if (e.button !== 0) return;
                isDrawing = true;
                startX = e.pageX; startY = e.pageY;
                selectionRect.style.display = 'block';
                selectionRect.style.left = startX + 'px'; selectionRect.style.top = startY + 'px';
            };
            window.onmousemove = (e) => {
                if (!isDrawing) return;
                const l = Math.min(startX, e.pageX), t = Math.min(startY, e.pageY);
                const w = Math.abs(startX - e.pageX), h = Math.abs(startY - e.pageY);
                selectionRect.style.left = l + 'px'; selectionRect.style.top = t + 'px';
                selectionRect.style.width = w + 'px'; selectionRect.style.height = h + 'px';
                seats.forEach(s => {
                    const b = s.getBoundingClientRect();
                    const sl = b.left + window.scrollX, st = b.top + window.scrollY;
                    if (!(l+w < sl || l > sl+b.width || t+h < st || t > st+b.height)) {
                        s.classList.add('temp-selected');
                    } else { s.classList.remove('temp-selected'); }
                });
            };
            window.onmouseup = () => {
                if (!isDrawing) return;
                isDrawing = false;
                selectionRect.style.display = 'none';
                document.querySelectorAll('.seat.temp-selected').forEach(s => {
                    s.className = `seat grade-color-${currentSelectedGrade}`;
                    seatAssignment[s.dataset.seatNo] = currentSelectedGrade;
                    s.classList.remove('temp-selected');
                });
                updateSeatInput();
            };
        }

        function restoreWeeklySchedule() {
            const days = ['월', '화', '수', '목', '금', '토', '일'];
            days.forEach(day => {
                const times = initialSchedule[day];
                if (times && times.length > 0) {
                    const radioY = document.querySelector(`input[name="is${day}Show"][value="Y"]`);
                    if (radioY) {
                        radioY.checked = true;
                        toggleTimeInputs(day, true);
                        const listArea = document.getElementById(`time-list-${day}`);
                        listArea.innerHTML = ""; 
                        times.forEach(t => addTimeInput(day, t));
                    }
                }
            });
            collectSchedule();
        }

        function toggleTimeInputs(day, isShow) {
            const area = document.getElementById(`time-area-${day}`);
            if(!area) return;
            area.style.display = isShow ? 'block' : 'none';
            if (isShow && document.getElementById(`time-list-${day}`).children.length === 0) {
                addTimeInput(day);
            }
            collectSchedule();
        }

        function addTimeInput(day, val = "") {
            const list = document.getElementById(`time-list-${day}`);
            const div = document.createElement('div');
            div.className = 'time-input-item';
            div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '5px';
            div.innerHTML = `
                <input type="text" class="time-val" value="${val}" placeholder="14:00" maxlength="5" 
                       style="width:65px; text-align:center; padding:5px; border:1px solid #ddd; border-radius:4px;" 
                       oninput="formatTime(this)" ${isStarted ? 'readonly' : ''}>
                ${!isStarted ? `<button type="button" class="btn-remove-time" style="background:#ff5e5e; color:#fff; border:none; border-radius:4px; cursor:pointer; padding:0 8px;" onclick="this.parentElement.remove(); collectSchedule();">×</button>` : ''}
            `;
            list.appendChild(div);
        }

        function formatTime(el) {
            el.value = el.value.replace(/\D/g,'').replace(/(\d{2})(\d{2})/,'$1:$2');
            collectSchedule();
        }

        function collectSchedule() {
            const schedule = {};
            ['월','화','수','목','금','토','일'].forEach(day => {
                const radioY = document.querySelector(`input[name="is${day}Show"][value="Y"]`);
                const isY = radioY ? radioY.checked : false;
                const times = Array.from(document.querySelectorAll(`#time-list-${day} .time-val`))
                                   .map(i => i.value).filter(v => v.length === 5);
                schedule[day] = isY ? times : [];
            });
            const input = document.getElementById('weeklyScheduleInput');
            if(input) input.value = JSON.stringify(schedule);
        }

        function updateSelectors() {
            const container = document.getElementById('grade-selectors');
            const names = document.getElementsByName('gradeNames');
            if(!container) return;
            container.innerHTML = "";
            names.forEach((input, idx) => {
                const num = idx + 1;
                const btn = document.createElement('button');
                btn.type = "button";
                btn.className = `selector-btn ${currentSelectedGrade === num ? 'active' : ''}`;
                btn.innerText = input.value || `${num}번 등급`;
                btn.style.margin = '0 5px';
                btn.onclick = () => { if(!isStarted) { currentSelectedGrade = num; updateSelectors(); } };
                container.appendChild(btn);
            });
        }

        function updateSeatInput() {
            const input = document.getElementById('seatGradeMapInput');
            if(input) input.value = JSON.stringify(seatAssignment);
        }

        function handlePriceInput(el) {
            let val = el.value.replace(/\D/g, "");
            el.value = val ? Number(val).toLocaleString() : "";
        }

        function previewSingle(input, id) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById(id).innerHTML = `<img src="${e.target.result}" width="180">`;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function validateAndSubmit() {
            const totalStart = document.getElementById('startDate').value;
            const totalEnd = document.getElementById('endDate').value;
            
            let dateValid = true;
            document.querySelectorAll('.openStart, .openEnd').forEach(el => {
                if (el.value < totalStart || el.value > totalEnd) {
                    dateValid = false;
                }
            });

            if (!dateValid) {
                alert("티켓 오픈 범위는 공연 전체 운영 기간 내에 있어야 합니다.");
                return false;
            }

            collectSchedule();
            return true;
        }

        function addOpenPeriod() {
            if(isStarted) return;
            const container = document.getElementById('open-period-container');
            const totalStart = document.getElementById('startDate').value;
            const totalEnd = document.getElementById('endDate').value;

            const newIdx = container.children.length + 1;
            const div = document.createElement('div');
            div.className = 'open-period-box';
            div.innerHTML = `
                <div class="period-title">
                    <strong>🎟️ 생성할 회차 범위 (세트 ${newIdx})</strong>
                    <button type="button" class="btn-remove" onclick="this.closest('.open-period-box').remove()">삭제</button>
                </div>
                <div class="date-row">
                    <input type="date" name="openStartDates" class="openStart" min="${totalStart}" max="${totalEnd}" required>
                    <input type="date" name="openEndDates" class="openEnd" min="${totalStart}" max="${totalEnd}" required>
                </div>
                <input type="datetime-local" name="openingTimes" required>`;
            container.appendChild(div);
        }
        /*]]>*/
    </script>
</body>
</html>
