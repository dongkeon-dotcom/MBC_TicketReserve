<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/user/reservationList.css}">
</head>
<body>
    <div th:replace="~{include/top::top}"></div>

<section class="reservation-wrapper">
    <div class="list-tabs">
    	<a th:href="@{/user/reservationList.do(status='CONFIRMED')}"
    		class="tab" th:classappend="${currentStatus == 'CONFIRMED' ? 'active' : ''}">예매내역</a>
        <span class="tab-divider">|</span>
    	<a th:href="@{/user/reservationList.do(status='CANCELLED')}"
    		class="tab" th:classappend="${currentStatus == 'CANCELLED' ? 'active' : ''}">취소내역</a>
    </div>

    <div th:each="res : ${list}" class="reserve-card" th:data-status="${res.status}">
    	<a th:href="@{/user/reservationOne.do(reserveNum=${res.reserveNum})}" class="full-link"></a>
    	 
        <div class="card-title">
            <span th:text="${res.title}"></span>
        </div>
        
        <div class="card-content">
            <div class="poster-section">
                <img th:src="@{'https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/' + ${res.posterImageName}}" alt="포스터">
            </div>
            
            <div class="info-section">
                <div class="info-row">
                    <span class="label">예매번호</span>
                    <span class="value blue-text" th:text="${res.reserveNum}"></span>
                </div>
                <div class="info-row">
                    <span class="label">예매일</span>
                    <span class="value" th:text="${#temporals.format(res.reserveDate, 'yyyy.MM.dd')}"></span>
                </div>
                <div class="info-row">
                    <span class="label">관람일시</span>
                    <span class="value" th:text="${#temporals.format(res.startTime, 'yyyy.MM.dd HH:mm')}"></span>
                </div>
                <div class="info-row">
                    <span class="label">취소마감일시</span>
                    <span class="value red-text"
                    		th:if="${res.startTime != null}"
                    		th:text="${#temporals.format(res.startTime.minusDays(1), 'yyyy년 MM월 dd일 HH:mm 까지')}"></span>
                </div>
                <div class="info-row">
                    <span class="label">상태</span>
                    <span class="value" th:switch="${res.status}">
                    	<span th:case="'CONFIRMED'">결제완료</span>
                    	<span th:case="'CANCELLED'">예매취소</span>
                    	<span th:case="'WATCHED'">관람완료</span></span>
                </div>
            </div>
            <div class="arrow-section">
                <span class="arrow-icon">›</span>
            </div>
        </div>
    </div>

		<div class="pagination" th:if="${totalPages > 0}" 
		     th:with="pageGroupSize=5,
		              currentGroup=${currentPage / pageGroupSize},
		              startPage=${currentGroup * pageGroupSize},
		              endPage=${(startPage + pageGroupSize - 1 < totalPages - 1) ? (startPage + pageGroupSize - 1) : (totalPages - 1)}">
		    
		    <a th:href="@{/user/reservationList.do(status=${currentStatus}, page=0)}" 
		       class="arrow-btn" th:classappend="${currentPage == 0} ? 'disabled' : ''">|<</a>
		    
		    <a th:href="@{/user/reservationList.do(status=${currentStatus}, page=${startPage - 1})}" 
		       class="arrow-btn" th:classappend="${startPage == 0} ? 'disabled' : ''">&lt;</a>
		
		    <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
		        <a th:href="@{/user/reservationList.do(status=${currentStatus}, page=${i})}"
		           th:text="${i + 1}"
		           th:classappend="${i == currentPage} ? 'active' : ''"></a>
		    </span>
		
		    <a th:href="@{/user/reservationList.do(status=${currentStatus}, page=${endPage + 1})}" 
		       class="arrow-btn" th:classappend="${endPage >= totalPages - 1} ? 'disabled' : ''">&gt;</a>
		    
		    <a th:href="@{/user/reservationList.do(status=${currentStatus}, page=${totalPages - 1})}" 
		       class="arrow-btn" th:classappend="${currentPage >= totalPages - 1} ? 'disabled' : ''">>|</a>
		</div>
</section>
<script th:inline="javascript">
/*<![CDATA[*/
const message = /*[[${msg}]]*/ null;
if (message) {
    alert(message);
}
/*]]>*/
</script>

    <div th:replace="~{include/bottom::footer}"></div>
</body>
</html>
