<html xmlns:th="http://www.thymeleaf.org">
<body>
	<div th:replace="include/top::top"></div>
	<section>
		<div style="text-align: center;">
			<br>
			<div
				style="display: inline-block; text-align: left; width: 100%; max-width: 500px;">
				<h1 style="text-align: center;"
					th:text="${isSocial ? '소셜 계정 회원가입' : '일반 회원가입'}">회원가입</h1>

				<form name="joinForm" th:action="@{/user/joinOK.do}" method="post"
					onsubmit="return validateForm()">

					<!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <input type="hidden" name="isSocialUser" th:value="${isSocial ? 'Y' : 'N'}" />  -->

					<table cellpadding="5" style="width: 100%;">
						<tr>
							<td style="font-weight: bold;">아이디(이메일) <span
								th:if="${isSocial}" class="social-badge"
								style="color: blue; font-size: 0.8em;">소셜인증 완료</span>
							</td>
							<td align="right">
								<button th:if="${!isSocial}" type="button"
									onclick="checkEmail()" class="btn btn-sm btn-outline-secondary">중복체크</button>
							</td>
						</tr>
						<tr>
							<td colspan="2"><input type="text" name="userId" id="userId"
								autocomplete="username" style="width: 100%; padding: 8px;"
								th:value="${userId}" th:readonly="${isSocial}"
								th:classappend="${isSocial} ? 'readonly-box' : ''"
								placeholder="이메일을 입력하세요" /> <span id="emailMsg"
								class="msg-text"></span></td>
						</tr>

						<th:block th:if="${!isSocial}">
							<tr>
								<td colspan="2" style="font-weight: bold; padding-top: 15px;">비밀번호</td>
							</tr>
							<tr>
								<td colspan="2"><input type="password" name="password"
									id="password" autocomplete="new-password"
									style="width: 100%; padding: 8px;"
									placeholder="비밀번호 입력 (최소 4자 이상)" /></td>
							</tr>
							<tr>
								<td colspan="2"><input type="password" name="userPWck"
									id="userPWck" autocomplete="new-password"
									style="width: 100%; padding: 8px;" placeholder="비밀번호 재입력" /></td>
							</tr>
						</th:block>
						<input th:if="${isSocial}" type="hidden" name="password" value="" />

						<tr>
							<td colspan="2" style="font-weight: bold; padding-top: 15px;">이름</td>
						</tr>
						<tr>
							<td colspan="2"><input type="text" name="name" id="name"
								style="width: 100%; padding: 8px;" th:value="${name}" /></td>
						</tr>

						<tr>
							<td colspan="2" style="font-weight: bold; padding-top: 15px;">전화번호</td>
						</tr>
						<tr>
							<td colspan="2"
								style="display: flex; align-items: center; gap: 5px;"><input
								type="text" name="phone" id="phone"
								style="flex: 1; padding: 8px;" placeholder="숫자만 입력"
								maxlength="11"
								oninput="this.value=this.value.replace(/[^0-9]/g,'');" /></td>
						</tr>
						<tr>
						    <td colspan="2" style="font-weight: bold; padding-top: 15px;">주소</td>
						</tr>
						<tr>
						    <td colspan="2">
						        <div class="address-group" style="display: flex; gap: 5px; margin-bottom: 5px;">
						            <input type="text" id="zipcode" name="zipcode" placeholder="우편번호" 
						                   style="flex: 1; padding: 8px; background-color: #f8f9fa;" readonly required>
						            <button type="button" class="btn-addr" onclick="execDaumPostcode()"
						                    style="padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em;">
						                우편번호 찾기
						            </button>
						        </div>
						        <input type="text" id="addr_main" name="addr_main" placeholder="기본 주소" 
						               style="width: 100%; padding: 8px; margin-bottom: 5px; background-color: #f8f9fa;" readonly required>
						        <input type="text" id="addr_extra" name="addr_extra" placeholder="상세주소를 입력하세요" 
						               style="width: 100%; padding: 8px;">
						        <input type="hidden" name="address" id="address">
						    </td>
						</tr>

						<tr>
							<td colspan="2" align="center"><br>
							<br>
								<button type="button" onclick="joinCheck()"
									style="width: 100%; height: 45px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
									회원가입 완료</button></td>
						</tr>
					</table>
				</form>
			</div>
		</div>
	</section>

	<script
		src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
	<script th:inline="javascript">
const _isSocial = /*[[${isSocial}]]*/ false;
let emailChecked = _isSocial;
//입력값검사
function joinCheck(){
	const form = document.joinForm;
	
	const addrMain = form.addr_main.value;
	const addrExtra = form.addr_extra.value;
	const fullAddr = form.address;
	
	if(form.userId.value.trim() ===""){
		alert("아이디(이메일)을 입력해주세요.");
		form.userId.focus();
		return;
	}
	
	if(!_isSocial){
		if(!emailChecked){
			alert("아이디(이메일) 중복체크를 진행해주세요.");
			return
		}
		if(form.password.value.length < 4){
			alert("비밀번호를 4자 이상 입력해주세요.");
			form.password.focus();
			return;
		}
		if(form.password.value !== form.userPWck.value){
			alert("비밀번호가 일치하지 않습니다.");
			form.userPWck.focus();
			return;
		}		
	}
	if(form.name.value.trim() === ""){
		alert("이름을 입력하세요.");
		form.name.focus();
		return;
	}
	
	if(form.phone.value.length<10){
		alert("전화번호를 확인해주세요");
		form.phone.focus();
		return;
	}
	
	if(addrMain.trim() === ""){
		alert("주소를 검색하여 입력해주세요.")
		return;
	}
	
	if(addrExtra.trim() === ""){
		alert("상세 주소를 입력해주세요.")
		return;
	}
	
	fullAddr.value = addrMain + " " + addrExtra;
	
	
	if(confirm("입력하신 정보로 회원가입을 진행할까요?")){
		form.submit();	
	}	
}

function checkEmail(){
	const userId = document.getElementById("userId").value;
	const msgSpan = document.getElementById("emailMsg");
	
	if(userId === ""){
		msgSpan.innerHTML = "아이디(이메일)을 입력하세요";
		msgSpan.style.color = "red";
		emailChecked = false;
		return;
	}
	
	// 서버에 중복 체크 요청
	fetch("/user/checkEmail.do",{
		method: "POST",
		headers: {
			"Content-Type": "application/x-www-form-urlencoded",
			// Spring Security 사용 시 CSRF 토큰 필요
            //"X-CSRF-TOKEN": document.querySelector('input[name="_csrf"]').value			
		},
		body: "userId=" + encodeURIComponent(userId)
	})
	.then(response => response.json())
	.then(isDuplicate => {
		if(isDuplicate){
			msgSpan.innerText = "이미 사용 중인 아이디(이메일)입니다.";
			msgSpan.style.color="red";
			emailChecked = false;
		} else {
			msgSpan.innerText = "사용 가능한 아이디(이메일) 입니다.";
			msgSpan.style.color = "green";
			emailChecked = true;
		}
	})
	.catch(error => console.error('Error:', error));
}

function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {
            var addr = '';
            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }
            document.getElementById('zipcode').value = data.zonecode;
            document.getElementById("addr_main").value = addr;
            document.getElementById("addr_extra").focus();
        }
    }).open();
}

</script>




	<div th:replace="include/bottom::footer"></div>
</body>
</html>
