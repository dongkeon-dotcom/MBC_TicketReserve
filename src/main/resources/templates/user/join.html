<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="include/top::top"></div>
<section>
    <div style="text-align: center;">
        <br>
        <div style="display: inline-block; text-align: left; width: 100%; max-width: 500px;">
            <h1 style="text-align: center;" th:text="${isSocial ? '소셜 계정 회원가입' : '일반 회원가입'}">회원가입</h1>

            <form name="joinForm" th:action="@{/user/joinOK.do}" method="post" onsubmit="return validateForm()">
                
                <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
                <input type="hidden" name="isSocialUser" th:value="${isSocial ? 'Y' : 'N'}" />  -->

                <table cellpadding="5" style="width: 100%;">
                    <tr>
                        <td style="font-weight: bold;">
                            아이디(이메일) 
                            <span th:if="${isSocial}" class="social-badge" style="color: blue; font-size: 0.8em;">소셜인증 완료</span>
                        </td>
                        <td align="right">
                            <button th:if="${!isSocial}" type="button" onclick="checkEmail()" class="btn btn-sm btn-outline-secondary">중복체크</button>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <input type="text" name="id" id="id" style="width: 100%; padding: 8px;"
                                   th:value="${id}" 
                                   th:readonly="${isSocial}"
                                   th:classappend="${isSocial} ? 'readonly-box' : ''"
                                   placeholder="이메일을 입력하세요" />
                            <span id="emailMsg" class="msg-text"></span>
                        </td>
                    </tr>

                    <th:block th:if="${!isSocial}">
                        <tr><td colspan="2" style="font-weight: bold; padding-top: 15px;">비밀번호</td></tr>
                        <tr>
                            <td colspan="2">
                                <input type="password" name="password" id="password" style="width: 100%; padding: 8px;" placeholder="비밀번호 입력 (최소 4자 이상)" />
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="password" name="userPWck" id="userPWck" style="width: 100%; padding: 8px;" placeholder="비밀번호 재입력" />
                            </td>
                        </tr>
                    </th:block>
                    <input th:if="${isSocial}" type="hidden" name="password" value="" />

                    <tr><td colspan="2" style="font-weight: bold; padding-top: 15px;">이름</td></tr>
                    <tr>
                        <td colspan="2">
                            <input type="text" name="userName" id="userName" style="width: 100%; padding: 8px;" th:value="${userName}" />
                        </td>
                    </tr>

                    <tr><td colspan="2" style="font-weight: bold; padding-top: 15px;">전화번호</td></tr>
                    <tr>
                        <td colspan="2" style="display: flex; align-items: center; gap: 5px;">
                            <input type="text" id="phone_body" style="flex: 1; padding: 8px;" 
                                   placeholder="숫자만 입력" maxlength="11"
                                   oninput="this.value=this.value.replace(/[^0-9]/g,'');" />
                            
                            <input type="hidden" name="userPhone" id="userPhone" />
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2" align="center">
                            <br><br>
                            <button type="button" onclick="joinCheck()" style="width: 100%; height: 45px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                                회원가입 완료
                            </button>
                        </td>
                    </tr>
                </table>
            </form>
        </div>
    </div>
</section>
<div th:replace="include/bottom::footer"></div>
</html>
