<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/user/join.css}">
</head>
<body>
    <div th:replace="~{include/top::top}"></div>

    <section>
        <div class="join-container" style="text-align: center;">
            <br>
            <div style="display: inline-block; text-align: left; width: 100%; max-width: 500px;">
                <h1 style="text-align: center;" 
                    th:text="${isSocial ? '소셜 계정 추가정보 입력' : '일반 회원가입'}">회원가입</h1>

                <form name="joinForm" th:action="@{/user/joinOK.do}" method="post">
                    <input type="hidden" name="EasyLogin" th:value="${isSocial}">
                    <input type="hidden" name="loginType" th:value="${user.loginType}">

                    <table cellpadding="5" style="width: 100%;">
                        <tr>
                            <td style="font-weight: bold;">아이디(이메일) 
                                <span th:if="${isSocial}" class="social-badge">소셜인증 완료</span>
                            </td>
                            <td align="right">
                                <button th:if="${!isSocial}" type="button" onclick="checkEmail()" class="btn-outline-secondary">중복체크</button>                                
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="text" name="userId" id="userId" autocomplete="username" 
                                       th:value="${user.userId}" th:readonly="${isSocial}"
                                       th:classappend="${isSocial} ? 'readonly-box' : ''"
                                       placeholder="이메일을 입력하세요" />
                                <span id="emailMsg" class="msg-text"></span>
                            </td>
                        </tr>
                        <tr>
                        <td colspan="2">
						<div id="verificationSection" style="display: none; margin-top: 10px;">
						    <div style="display: flex; gap: 5px;">
						        <input type="text" id="authCode" placeholder="인증번호 6자리 입력" maxlength="6">
						        <button type="button" onclick="verifyAuthCode()" class="btn-outline-secondary"> 인증확인 </button>
						    </div>
						    <span id="authMsg" class="msg-text"></span>
						</div>
						</td>
						</tr>                        

                        <th:block th:if="${!isSocial}">
                            <tr>
                                <td colspan="2" style="font-weight: bold; padding-top: 15px;">비밀번호</td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="password" name="password" id="password" autocomplete="new-password"
                                           placeholder="비밀번호 입력 (최소 4자 이상)" />
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <input type="password" name="userPWck" id="userPWck" autocomplete="new-password" 
                                           placeholder="비밀번호 재입력" />
                                </td>
                            </tr>
                        </th:block>
                        <input th:if="${isSocial}" type="hidden" name="password" value="" />

                        <tr>
                            <td colspan="2" style="font-weight: bold; padding-top: 15px;">이름</td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="text" name="name" id="name" 
                                       th:value="${user.name}" th:readonly="${isSocial}"
                                       th:classappend="${isSocial} ? 'readonly-box' : ''"
                                       placeholder="이름을 입력하세요" />
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2" style="font-weight: bold; padding-top: 15px;">전화번호</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="display: flex; align-items: center; gap: 5px;">
                                <input type="text" name="phone" id="phone" placeholder="숫자만 입력" maxlength="11"
                                       oninput="this.value=this.value.replace(/[^0-9]/g,'');" />
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2" style="font-weight: bold; padding-top: 15px;">주소</td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <div class="address-group" style="display: flex; gap: 5px; margin-bottom: 5px;">
                                    <input type="text" id="zipcode" name="zipcode" placeholder="우편번호" readonly required>
                                    <button type="button" class="btn-addr" onclick="execDaumPostcode()">우편번호 찾기</button>
                                </div>
                                <input type="text" id="address" name="address" placeholder="기본 주소" 
                                       style="margin-bottom: 5px;" readonly required>
                                <input type="text" id="extraAddress" name="extraAddress" placeholder="상세주소를 입력하세요">
                            </td>
                        </tr>

                        <tr>
                            <td colspan="2" align="center">
                                <br>
                                <button type="button" onclick="joinCheck()" class="join-submit-btn">가입 완료</button>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </section>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script th:inline="javascript">
    const _isSocial = /*[[${isSocial}]]*/ false;
    console.log("현재 소셜 여부: ", _isSocial)
    let emailChecked = _isSocial;
    let isEmailVerified = false;

        function joinCheck(){
            const form = document.joinForm;
            const addrMain = form.address.value;
            const addrExtra = form.extraAddress.value;
            
            if(form.userId.value.trim() === ""){
                alert("아이디(이메일)을 입력해주세요.");
                form.userId.focus();
                return;
            }
            
            // 소셜 가입이 아닐 때만 이메일 중복 및 비밀번호 체크
            if(!_isSocial){
                if(!emailChecked){
                    alert("아이디(이메일) 중복체크를 진행해주세요.");
                    return;
                }
                if(form.password.value.length < 4){
                    alert("비밀번호를 4자 이상 입력해주세요.");
                    form.password.focus();
                    return;
                }
                if(form.password.value !== form.userPWck.value){
                    alert("비밀번호가 일치하지 않습니다.");
                    form.userPWck.focus();
                    return;
                }
                
                if(!isEmailVerified) {
                	alert("이메일 인증이 완료되지 않았습니다.");
                	return;
                }
            }

            if(form.name.value.trim() === ""){
                alert("이름을 입력하세요.");
                form.name.focus();
                return;
            }
            
            if(form.phone.value.length < 10){
                alert("전화번호를 확인해주세요.");
                form.phone.focus();
                return;
            }
            
            if(addrMain.trim() === ""){
                alert("주소를 검색하여 입력해주세요.");
                return;
            }
            
            if(addrExtra.trim() === ""){
                alert("상세 주소를 입력해주세요.");
                form.extraAddress.focus();
                return;
            }
            
            if(confirm("입력하신 정보로 회원가입을 완료할까요?")){
                form.submit();	
            }	
        }

        function checkEmail(){
            const userId = document.getElementById("userId").value;
            const msgSpan = document.getElementById("emailMsg");
            const vSection = document.getElementById("verificationSection");
            
            if(userId === ""){
                msgSpan.innerHTML = "아이디(이메일)을 입력하세요";
                msgSpan.style.color = "red";
                emailChecked = false;
                return;
            }
            
            fetch("/user/checkEmail.do", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "userId=" + encodeURIComponent(userId)
            })
            .then(response => response.json())
            .then(isDuplicate => {
                if(isDuplicate){
                    msgSpan.innerText = "이미 사용 중인 아이디(이메일)입니다.";
                    msgSpan.style.color = "red";
                    emailChecked = false;
                } else {
                    msgSpan.innerText = "사용 가능한 아이디(이메일) 입니다. 인증 메일 발송 중...";
                    msgSpan.style.color = "green";
                    emailChecked = true;
                    
                    sendVerificationMail(userId);
                }
            })
            .catch(error => console.error('Error:', error));
        }

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    var addr = (data.userSelectedType === 'R') ? data.roadAddress : data.jibunAddress;
                    document.getElementById('zipcode').value = data.zonecode;
                    document.getElementById("address").value = addr;
                    document.getElementById("extraAddress").focus();
                }
            }).open();
        }
        
        function sendVerificationMail(email){
        	fetch("/user/sendAuthMail.do", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body:  new URLSearchParams({
                	'email': email,
                	'status': 'join'
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("인증 메일이 발송되었습니다. 5분 이내에 입력해주세요.");
                    document.getElementById("verificationSection").style.display = "block";
                } else if (response.status === 429) { // Too Many Requests (또는 설정한 에러코드)
                    alert("메일 발송은 1분에 한 번만 가능합니다. 잠시 후 다시 시도해주세요.");
                } else {
                    alert("메일 발송에 실패했습니다.");
                }
            });
        }
        
        function verifyAuthCode() {
            const userIdInput = document.getElementById("userId");
            const authCodeInput = document.getElementById("authCode");
            const authMsg = document.getElementById("authMsg");
            
            // 버튼 선택자를 더 안전하게 id가 아닌 속성값으로 찾기
            const verifyBtn = document.querySelector("#verificationSection button");
            const checkEmailBtn = document.querySelector("button[onclick='checkEmail()']");

            const email = userIdInput.value;
            const code = authCodeInput.value; // 값은 fetch 보낼 때만 사용

            fetch("/user/verify.do", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`
            })
            .then(response => response.json())
            .then(success => {
                if (success) {
                    authMsg.innerText = "인증 성공!";
                    authMsg.style.color = "blue";
                    isEmailVerified = true;

                    // 1. 아이디(이메일) 입력창 고정 및 회색 처리
                    userIdInput.readOnly = true;
                    userIdInput.style.backgroundColor = "#e9ecef";
                    userIdInput.style.color = "#6c757d";

                    // 2. 중복체크 버튼 비활성화
                    if(checkEmailBtn) checkEmailBtn.disabled = true;

                    // 3. 인증번호 입력창 고정 및 회색 처리
                    authCodeInput.readOnly = true;
                    authCodeInput.style.backgroundColor = "#e9ecef";
                    authCodeInput.style.color = "#6c757d";

                    // 4. 인증 확인 버튼 비활성화 및 시각 효과
                    if(verifyBtn) {
                        verifyBtn.disabled = true;
                        verifyBtn.style.backgroundColor = "#e9ecef";
                        verifyBtn.style.color = "#6c757d";
                        verifyBtn.style.opacity = "0.6";
                        verifyBtn.style.cursor = "not-allowed";
                    }
                    
                } else {
                    authMsg.innerText = "인증번호가 틀렸거나 만료되었습니다.";
                    authMsg.style.color = "red";
                    isEmailVerified = false;
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>

    <div th:replace="~{include/bottom::footer}"></div>
</body>
</html>
