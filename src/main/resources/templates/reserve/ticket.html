<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

	    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
	    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>

    <meta charset="UTF-8">
    <title>예매 - [[${performance.title}]]</title>
    <link rel="stylesheet" th:href="@{/css/reserve/ticket.css}">
</head>
<body>
    <div th:replace="~{include/top::top}"></div>

    <div class="reserve-container">
        <div class="performance-header">
			<div class="poster-box">
			               <img th:src="@{|https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/MAIN_POSTER/${performance.posterImageName}|}" alt="포스터">
			            </div>
			
						<div class="info-box">
						        <h2 th:text="${performance.title}">공연 제목</h2>
						        <p>📅 [[${performance.startDate}]] ~ [[${performance.endDate}]] | </p>
								<div class="price-info-container">
								        <span class="price-info-title">좌석 등급별 가격</span>
								        <ul class="price-list">
								            <li th:each="config : ${performance.grades}" class="price-item">
								                <span class="grade-label" th:text="${config.gradeName}">VIP석</span>
								                <span class="grade-price" th:text="${#numbers.formatInteger(config.gradePrice, 3, 'COMMA')}">150,000</span>
								            </li>
								        </ul>
								    </div>
						    </div>
        </div>
		
        <div class="reserve-main-wrapper">
            <div class="calendar-box">
				<div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
				    <button type="button" id="prev-month" style="cursor:pointer; border:none; background:none; font-size:1.2rem; font-weight:bold;">&lt;</button>
				    <span id="current-month-display" style="font-weight: bold; font-size: 1.1rem;"></span>
				    <button type="button" id="next-month" style="cursor:pointer; border:none; background:none; font-size:1.2rem; font-weight:bold;">&gt;</button>
				</div>
                <table class="date-picker-table">
                    <thead>
                        <tr>
                            <th class="sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sat">토</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body"></tbody>
                </table>
                <div class="calendar-footer-info">
                    <span class="dot-show">●</span> 관람 가능일
                </div>
            </div>
		

			    <div class="booking-right-side">
			        <div class="schedule-box">
			            <h4>회차선택</h4>
			            <div id="time-slot-container">
			                <p class="empty-msg">날짜를 선택해주세요.</p>
			            </div>
			        </div>

			        <div class="seat-status-box">
			            <h4>예매가능좌석</h4>
			            <div id="grade-container">
			                <p class="empty-msg">회차를 선택하면<br>좌석이 표시됩니다.</p>
			            </div>
			        </div>
			    </div>
		
        </div>

        <div class="reserve-footer">
            <button type="button" id="reserve-btn" class="btn-reserve" onclick="goToSeatSelection()" disabled>
                <span id="btn-text">데이터 로딩 중...</span>
            </button>
        </div>

		<section class="detail-section" style="margin-top: 50px;">
		    <h3 style="border-bottom: 2px solid #333; padding-bottom: 10px;">상세 정보</h3>
		    <div class="detail-img-list" style="text-align: center;">
		        <div th:each="img : ${performance.detailImages}">
					<img th:src="@{|https://s3-202601052.s3.ap-northeast-2.amazonaws.com/TICKET/DETAIL_IMAGE/${img.imageName}|}" 
					     alt="상세내용" 
					     style="max-width: 100%; display: block; margin: 10px auto;">
		        </div>
		    </div>
		</section>
    </div>
	<div id="waitingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999;">
	    <div style="background:white; width:400px; margin: 200px auto; padding:30px; text-align:center; border-radius:10px;">
	        <h2 id="modalTitle">현재 예매 대기 중입니다.</h2>
	        <p id="rankDisplay" style="font-size: 1.2rem; font-weight: bold; color: #ff5a00;"></p>
	        <p>순번이 되면 자동으로 입장됩니다.</p>
	        <button id="enterBtn" style="display:none; padding:10px 20px; background:#ff5a00; color:white; border:none; cursor:pointer;" onclick="closeModalAndOpen()">입장하기</button>
	    </div>
	</div>
    <div th:replace="~{include/bottom::footer}"></div>

	<script th:inline="javascript">
	    /*<![CDATA[*/
		// 메타 태그가 없을 경우를 대비해 null 체크
		const csrfMeta = document.querySelector('meta[name="_csrf"]');
		const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';
		const csrfHeader = document.querySelector('meta[name="_csrf_header"]') ? 
		                   document.querySelector('meta[name="_csrf_header"]').getAttribute('content') : '';
		
		
	    const allSchedules = /*[[${schedules}]]*/ [];    
	    let selectedScheduleId = null;
	    let viewYear, viewMonth;

	    // 티켓 오픈 시간 설정
	    const openDateStr = /*[[${openDate}]]*/ ''; 
	    const openTime = openDateStr ? new Date(openDateStr).getTime() : null;

	    document.addEventListener('DOMContentLoaded', function() {
	        // 초기 날짜 설정 (공연 시작일 기준)
	        const startStr = /*[[${#temporals.format(performance.startDate, 'yyyy-MM-dd')}]]*/ '';
	        
	        if (startStr) {
	            const parts = startStr.split('-');
	            viewYear = parseInt(parts[0]);
	            viewMonth = parseInt(parts[1]) - 1;
	            updateCalendarDisplay();
	        }

	        // 달력 이동 이벤트
	        document.getElementById('prev-month').onclick = function() {
	            viewMonth--;
	            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
	            updateCalendarDisplay();
	        };

	        document.getElementById('next-month').onclick = function() {
	            viewMonth++;
	            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
	            updateCalendarDisplay();
	        };

	        // 티켓 상태 체크 루프
	        updateTicketStatus();
	        setInterval(updateTicketStatus, 1000);
	    });

	    function updateCalendarDisplay() {
	        const monthDisplay = document.getElementById('current-month-display');
	        if (monthDisplay) {
	            monthDisplay.innerText = `${viewYear}. ${String(viewMonth + 1).padStart(2, '0')}`;
	        }
	        renderCalendar(viewYear, viewMonth);
	    }

	    function updateTicketStatus() {
	        if (!openTime) {
                document.getElementById('btn-text').innerText = "예매 가능";
                return;
            }

	        const now = new Date().getTime();
	        const diff = openTime - now;
	        const btn = document.getElementById('reserve-btn');
	        const btnText = document.getElementById('btn-text');
	        const calendarTable = document.querySelector('.date-picker-table');
	        
	        const ONE_HOUR = 3600000;

	        if (diff > ONE_HOUR) {
	            btn.disabled = true;
	            calendarTable.style.opacity = "0.4";
	            calendarTable.style.pointerEvents = "none";
	            const openDate = new Date(openTime);
	            btnText.innerText = `${openDate.getMonth()+1}월 ${openDate.getDate()}일 오픈 예정`;
	        } else if (diff > 0) {
	            btn.disabled = true;
	            calendarTable.style.opacity = "0.2";
	            calendarTable.style.pointerEvents = "none";
	            btnText.innerText = "잠시 후 오픈! 정각에 새로고침 하세요";
	            btn.style.backgroundColor = "#555";
	        } else {
	            btn.disabled = false;
	            btnText.innerText = "얘매하기";
	            calendarTable.style.opacity = "1";
	            calendarTable.style.pointerEvents = "auto";
	            btn.style.backgroundColor = "#ff5a00";
                
                // 오픈 정각에 클릭하면 안전하게 새로고침 유도
	            if (!btn.dataset.reloaded) {
	                btn.onclick = function() { location.reload(); };
	                btn.dataset.reloaded = "true";
	            } else {
	                btn.onclick = goToSeatSelection;
	            }
	        }
	    }

		function renderCalendar(year, month) {
		    const firstDay = new Date(year, month, 1).getDay();
		    const lastDate = new Date(year, month + 1, 0).getDate();
		    const calendarBody = document.getElementById('calendar-body');
		    if (!calendarBody) return;
		    
		    calendarBody.innerHTML = '';
		    let date = 1;

		    // 오늘 날짜 정보 (시간을 00:00:00으로 설정하여 날짜만 비교)
		    const today = new Date();
		    today.setHours(0, 0, 0, 0);

		    for (let i = 0; i < 6; i++) {
		        let row = document.createElement('tr');
		        for (let j = 0; j < 7; j++) {
		            let cell = document.createElement('td');
		            if (i === 0 && j < firstDay) {
		                cell.classList.add('empty');
		            } else if (date > lastDate) {
		                cell.classList.add('empty');
		            } else {
		                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
		                const cellDate = new Date(year, month, date);
		                
		                cell.innerText = date;
		                
		                // 해당 날짜에 공연이 있는지 확인
		                const hasShow = allSchedules.some(s => s.startTime && s.startTime.startsWith(dateStr));
		                
		                // [변경] 오늘보다 이전 날짜거나 공연이 없는 날은 비활성화
		                if (cellDate >= today && hasShow) {
		                    cell.classList.add('has-show');
		                    cell.onclick = function() { selectDate(dateStr, this); };
		                } else {
		                    cell.classList.add('disabled');
		                    cell.style.color = "#ccc"; // 지난 날짜는 흐리게 표시
		                    cell.style.cursor = "default";
		                }
		                date++;
		            }
		            row.appendChild(cell);
		        }
		        calendarBody.appendChild(row);
		        if (date > lastDate) break;
		    }
		}

		function selectDate(dateStr, element) {
		    document.querySelectorAll('.date-picker-table td').forEach(td => td.classList.remove('active'));
		    element.classList.add('active');

		    const container = document.getElementById('time-slot-container');
		    container.innerHTML = '';
		    
		    // 현재 시간 (1시간 전 체크용)
		    const now = new Date();
		    const filtered = allSchedules.filter(s => s.startTime && s.startTime.startsWith(dateStr));

		    if (filtered.length === 0) {
		        container.innerHTML = '<p class="empty-msg">해당 날짜에 공연이 없습니다.</p>';
		        return;
		    }

			filtered.forEach((s, index) => {
					        const startTime = new Date(s.startTime);
					        const timeStr = startTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });

					        const isTimeOver = (startTime.getTime() - now.getTime()) < 3600000;

					        const div = document.createElement('div');
					        div.className = 'time-slot';
					        
					        if (isTimeOver) {
					            div.classList.add('disabled');
					            div.innerText = `${index + 1}회 ${timeStr} (예매마감)`;
					            div.style.opacity = "0.5";
					            div.style.cursor = "not-allowed";
					        } else {
					            div.innerText = `${index + 1}회 ${timeStr}`;
								div.onclick = function() {
								    const clickedElement = this;

									fetch(`/reserve/check-reservation.do?scheduleId=${s.scheduleId}&t=${new Date().getTime()}`, {
									    headers: getHeaders()
									})
								        .then(response => response.json())
								        .then(data => {
								            if (data.reserved) {
								                alert("이미 해당 회차에 대한 예매 내역이 존재합니다. (1인 1매 제한)");
								                return;
								            }

								            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
								            clickedElement.classList.add('selected');
								            selectedScheduleId = s.scheduleId;

								            const gradeContainer = document.getElementById('grade-container');
								            gradeContainer.innerHTML = '';
								            
								            if (s.seatStatus && s.seatStatus.length > 0) {
								                s.seatStatus.forEach(status => {
								                    const infoDiv = document.createElement('div');
								                    infoDiv.className = 'grade-info';
								                    infoDiv.innerHTML = `
								                        <span class="grade-name">${status.gradeName}</span>
								                        <span class="grade-price"><b style="color: #ff5a00;">${status.remainCount}</b>석</span>
								                    `;
								                    gradeContainer.appendChild(infoDiv);
								                });
								            }
								        })
								        .catch(error => {
								            console.error("예매 여부 확인 중 오류:", error);
								            alert("예매 정보를 확인하는 중 오류가 발생했습니다.");
								        });
								};
					        } // if-else 닫음
					        container.appendChild(div);
					    }); // <--- forEach를 닫는 }); 추가 (기존에 누락됨)
					} // <--
					async function goToSeatSelection() {
					    if (!selectedScheduleId) {
					        alert("공연 회차를 선택해주세요.");
					        return;
					    }

					    try {
					        const response = await fetch('/reserve/check-queue'							, {
							            method: 'GET', // POST 요청인지 확인하세요
							            headers: getHeaders() // 추가됨
							        });
					        const data = await response.json();
					        
					        console.log("서버 응답:", data);

					        // 1. 로그인 필요 상황 처리
					        if (data.status === "REDIRECT_LOGIN") {
					            if (confirm("로그인이 필요한 서비스입니다. 로그인 페이지로 이동하시겠습니까?")) {
									window.location.href = /*[[@{/user/login.do}]]*/ '/user/login.do';
					            }
					            return;
					        }

					        // 2. 대기열 없이 바로 입장
					        if (data.status === "DIRECT") {
					            console.log("대기열 없음: 바로 입장");
					            openSeatPopup();
					        } 
					        // 3. 대기열 발생
					        else {
					            console.log("대기열 발생: 모달 오픈, 내 순번:", data.rank);
					            startWaiting(data.rank);
					        }
					    } catch (e) {
					        console.error("대기열 확인 실패:", e);
					        alert("서버 통신 중 오류가 발생했습니다.");
					    }
					}

					function openSeatPopup() {
					    const url = "/reserve/seat.do?scheduleId=" + selectedScheduleId;
					    const width = 1100;
					    const height = 850;
					    const left = (window.screen.width / 2) - (width / 2);
					    const top = (window.screen.height / 2) - (height / 8);
					    window.open(url, "reservePopup", `width=${width}, height=${height}, left=${left}, top=${top}`);
					}

					function startWaiting(initialRank) {
					    const modal = document.getElementById("waitingModal");
					    const rankDisplay = document.getElementById("rankDisplay");
					    modal.style.display = "block";
					    
					    // 상태 표시
					    rankDisplay.innerText = initialRank === 0 ? "입장 준비 중..." : `내 순번: ${initialRank}번째`;

					    // 3초마다 순번 체크
					    const interval = setInterval(async () => {
					        try {
					            const res = await fetch('/reserve/check-rank', {
					                method: 'GET',
					                headers: getHeaders()
					            });
					            const d = await res.json();
					            
					            // 서버에서 d.rank가 0이면 입장이 가능하다는 신호라고 가정합니다.
					            // 만약 서버 로직상 다른 신호를 보낸다면 그에 맞게 수정하세요.
					            if (d.rank <= 0) { 
					                clearInterval(interval); // 폴링 중단
					                modal.style.display = "none";
					                openSeatPopup(); // <--- 여기서 자동으로 좌석 선택창을 엽니다.
					            } else {
					                rankDisplay.innerText = `내 순번: ${d.rank}번째`;
					            }
					        } catch (error) {
					            console.error("순번 확인 중 에러:", error);
					        }
					    }, 3000);
					}
					
					function closeModalAndOpen() {
					        document.getElementById("waitingModal").style.display = "none";
					        openSeatPopup();
					    }
						
								//개발자용 툴 막기! 
						document.addEventListener('keydown', function(e) {
						    // 1. F12 막기
						    if (e.key === "F12") {
						        e.preventDefault();
						        return false;
						    }

						    // 2. Ctrl + Shift + I (개발자 도구) 막기
						    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
						        e.preventDefault();
						        return false;
						    }

						    // 3. Ctrl + Shift + J (콘솔) 막기
						    if (e.ctrlKey && e.shiftKey && e.key === 'J') {
						        e.preventDefault();
						        return false;
						    }

						    // 4. Ctrl + U (소스 보기) 막기
						    if (e.ctrlKey && e.key === 'u') {
						        e.preventDefault();
						        return false;
						    }
						}, false);
						
						document.addEventListener('contextmenu', function(e) {
						    e.preventDefault();
						}, false);		
						
			
						
						
						// fetch 사용 시 헤더에 토큰이 있을 때만 추가
						function getHeaders() {
						    const headers = { 'Content-Type': 'application/json' };
						    if (csrfHeader && csrfToken) {
						        headers[csrfHeader] = csrfToken;
						    }
						    return headers;
						}
	    /*]]>*/
	</script>
</body>
</html>
