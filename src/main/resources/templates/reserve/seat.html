
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/reserve/seat.css}">
    <meta charset="UTF-8">
    <title>좌석 선택 - [[${performance.title}]]</title>
</head>
<head>
    <meta th:if="${_csrf}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf}" name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

    <div class="step-bar-container">
        <ul class="step-bar">
            <li><span>01</span> 날짜/회차선택</li>
            <li class="active"><span>02</span> 등급/좌석선택</li>
            <li><span>03</span> 권종/할인/매수선택</li>
            <li><span>04</span> 배송선택/예매확인</li>
            <li><span>05</span> 결제</li>
        </ul>
    </div>

    <div class="seat-selection-wrapper">
        <div class="seat-map-section">
            <div class="performance-mini-info">
                <div class="info-text">
                    <h3 th:text="${performance.title}">공연 제목</h3>
                    <p>[[${#temporals.format(schedule.startTime, 'yyyy.MM.dd(E) HH:mm')}]]</p>
                </div>
                <button class="btn-change-date" onclick="openModal()">회차변경</button>
            </div>

            <div class="map-viewport">
                <div class="floating-controls">
                    <button onclick="zoomSeat(0.1)">+</button>
                    <button onclick="zoomSeat(-0.1)">-</button>
                    <button onclick="location.reload()">↻</button>
                </div>

                <div class="stage">STAGE</div>
                
				<div class="seat-grid" id="seat-grid">
					<div th:each="seat : ${seats}" 
					     class="seat"
					     th:classappend="|grade-${seat.seatType} 
					                     ${(seat.isReserved == 1 or seat.isReserved == 3) ? 'is-paid' : 'available'}|"
					     th:data-id="${seat.seatId}"
					     th:data-status="${seat.isReserved}" 
					     onclick="handleSeatClick(this)">
					     
					     <span th:if="${seat.isReserved == 0}" th:text="${seat.seatNumber}"></span>
					     <span th:if="${seat.isReserved != 0}">X</span>
					</div>
					
								</div>
                </div>
            </div>
        </div>

        <div class="info-sidebar">
            <div class="minimap-area">
                <div class="minimap-placeholder">MINI MAP</div>
            </div>

            <div class="grade-status-area">
                <div class="selected-bottom-bar">
                    <div class="selected-label">선택된 좌석</div>
                    <div id="selected-seat-tag" class="seat-tag">좌석을 선택하세요</div>
                    <button class="btn-reset" onclick="resetSelection()">초기화</button>
                </div>
                
                <div class="grade-header">
                    <span>등급 선택</span>
                    <button class="btn-refresh" onclick="location.reload()">새로고침</button>
                </div>
                
                <div class="grade-list">
                    <div th:each="grade : ${grades}" class="grade-item">
                        <span class="grade-name" th:text="${grade.gradeName}">등급</span>
                        <span class="grade-price" th:text="${#numbers.formatInteger(grade.price, 3, 'COMMA') + '원'}">0원</span>
                        <span class="remain-count"><b th:text="${grade.remainCount}">0</b>석</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-buttons">
                <button class="btn-prev" onclick="history.back()">이전단계</button>
                <button id="payment-btn" class="btn-next" disabled onclick="goToPayment()">다음단계</button>
            </div>
        </div>
    </div>

    <div id="date-change-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>날짜/회차 변경</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="calendar-controls">
                <button onclick="changeMonth(-1)">&lt;</button>
                <span id="calendar-title"></span>
                <button onclick="changeMonth(1)">&gt;</button>
            </div>
            <table class="date-picker-table">
                <thead><tr><th>일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th></tr></thead>
                <tbody id="modal-calendar-body"></tbody>
            </table>
            <div id="modal-time-slot-container"></div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
		
		// 토큰 읽기
		const csrfMeta = document.querySelector('meta[name="_csrf"]');
		const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';
		const csrfHeader = document.querySelector('meta[name="_csrf_header"]') ? 
		                   document.querySelector('meta[name="_csrf_header"]').getAttribute('content') : '';
		
		
		
						   // 공통 헤더 생성 함수
						   function getHeaders() {
						       const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
						       if (csrfHeader && csrfToken) {
						           headers[csrfHeader] = csrfToken;
						       }
						       return headers;
						   }
		
		
		
        window.allSchedules = /*[[${schedules}]]*/ [];
        window.currentSelectedId = null; 
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let currentZoom = 1.0;

        window.zoomSeat = function(delta) {
            currentZoom = Math.max(0.5, Math.min(2.0, currentZoom + delta));
            const grid = document.getElementById('seat-grid');
            if (grid) {
                grid.style.transform = `scale(${currentZoom})`;
                grid.style.transformOrigin = "top left";
                grid.style.width = (100 / currentZoom) + "%";
            }
        };

        window.selectSeat = function(seatId) {
            const seatElement = document.querySelector(`.seat[data-id='${seatId}']`);
            
            // [추가] is-secret 클래스 방어 코드
            if (!seatElement || seatElement.classList.contains('is-secret')) {
                alert("선택할 수 없는 좌석입니다.");
                return;
            }
            if (!seatElement.classList.contains('available')) return;

            if (window.currentSelectedId && window.currentSelectedId != seatId) {
                cancelSeatRequest(window.currentSelectedId);
            }

            fetch('/reserve/selectSeat.do', {
                method: 'POST',
				headers: getHeaders(), // 수정됨
                body: 'seatId=' + seatId
            })
            .then(response => {
                if (response.ok) {
                    document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
                    seatElement.classList.add('selected');
                    window.currentSelectedId = seatId;
                    document.getElementById('selected-seat-tag').innerText = seatElement.getAttribute('data-name');
                    document.getElementById('payment-btn').disabled = false;
                } else {
                    response.text().then(msg => alert(msg));
                }
            });
        };

        function cancelSeatRequest(seatId) {
			if (!seatId) return;
			    fetch('/reserve/cancelSeat.do', {
			        method: 'POST',
			        headers: getHeaders(), // 수정됨
			        body: 'seatId=' + seatId
			    });
			}

        window.addEventListener('beforeunload', function () {
            if (window.currentSelectedId) {
                const params = new URLSearchParams();
                params.append('seatId', window.currentSelectedId);
                navigator.sendBeacon('/reserve/cancelSeat.do', params);
            }
        });

        window.openModal = function() { document.getElementById('date-change-modal').style.display = 'flex'; renderModalCalendar(currentYear, currentMonth); };
        window.closeModal = function() { document.getElementById('date-change-modal').style.display = 'none'; };
        window.changeMonth = function(diff) { currentMonth += diff; if(currentMonth>11){currentMonth=0; currentYear++} if(currentMonth<0){currentMonth=11; currentYear--} renderModalCalendar(currentYear, currentMonth); };

        function renderModalCalendar(year, month) {
            const tbody = document.getElementById('modal-calendar-body');
            const timeContainer = document.getElementById('modal-time-slot-container');
            document.getElementById('calendar-title').innerText = `${year}년 ${month + 1}월`;
            tbody.innerHTML = '';
            timeContainer.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            let date = 1;
            for (let i = 0; i < 6; i++) {
                let row = document.createElement('tr');
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement('td');
                    if ((i === 0 && j < firstDay) || date > lastDate) { cell.innerText = ''; } 
                    else {
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                        cell.innerText = date;
                        const hasSchedule = window.allSchedules.some(s => s.startTime.startsWith(dateStr));
                        if (hasSchedule) {
                            cell.classList.add('available');
                            cell.onclick = function() {
                                document.querySelectorAll('.date-picker-table td').forEach(td => td.classList.remove('selected-date'));
                                cell.classList.add('selected-date');
                                selectModalDate(dateStr);
                            };
                        } else { cell.classList.add('disabled'); }
                        date++;
                    }
                    row.appendChild(cell);
                }
                tbody.appendChild(row);
                if (date > lastDate) break;
            }
        }

        function selectModalDate(dateStr) {
            const container = document.getElementById('modal-time-slot-container');
            container.innerHTML = '';
            const daySchedules = window.allSchedules.filter(s => s.startTime.startsWith(dateStr));
            daySchedules.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = s.startTime.substring(11, 16);
                btn.onclick = () => { location.href = "/reserve/seat.do?scheduleId=" + s.scheduleId; };
                container.appendChild(btn);
            });
        }

        window.resetSelection = function() {
            if (window.currentSelectedId) cancelSeatRequest(window.currentSelectedId);
            document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
            window.currentSelectedId = null;
            document.getElementById('selected-seat-tag').innerText = "좌석을 선택하세요";
            document.getElementById('payment-btn').disabled = true;
        };

        window.goToPayment = function() {
            if (!window.currentSelectedId) { alert("좌석을 선택해 주세요."); return; }
            location.href = "/payment/payment.do?seatId=" + window.currentSelectedId;
        };
		
		function handleSeatClick(element) {
		    const status = parseInt(element.getAttribute('data-status'));
		    
		    // 1. 보유석(3)이나 예매완료(1)일 때 바로 차단 (기존 기능 유지)
		    if (status !== 0) {
		        alert('선택할 수 없는 좌석입니다.');
		        return; 
		    }

		    // 2. 0일 때는 기존의 selectSeat 함수를 그대로 호출
		    const seatId = element.getAttribute('data-id');
		    selectSeat(seatId); 
		}
		
		
		function selectSeat(seatId) {
		    // 기존 AJAX 예매 로직
		    fetch('/reserve/selectSeat.do?seatId=' + seatId, { method: 'POST' })
		        .then(response => response.text())
		        .then(data => {
		            alert(data);
		            location.reload(); // 성공 시 화면 갱신
		        });
		}
		
		
		//개발자용 툴 막기! 
								document.addEventListener('keydown', function(e) {
								    // 1. F12 막기
								    if (e.key === "F12") {
								        e.preventDefault();
								        return false;
								    }

								    // 2. Ctrl + Shift + I (개발자 도구) 막기
								    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
								        e.preventDefault();
								        return false;
								    }

								    // 3. Ctrl + Shift + J (콘솔) 막기
								    if (e.ctrlKey && e.shiftKey && e.key === 'J') {
								        e.preventDefault();
								        return false;
								    }

								    // 4. Ctrl + U (소스 보기) 막기
								    if (e.ctrlKey && e.key === 'u') {
								        e.preventDefault();
								        return false;
								    }
								}, false);
								//마우스 우클릭 차단 
								document.addEventListener('contextmenu', function(e) {
								    e.preventDefault();
								}, false);		
		
		
		
        /*]]>*/
    </script>
</body>
</html>
